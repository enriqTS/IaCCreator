# For testers — pulls the pre-built image from GitHub Container Registry.
# Usage:
#   docker compose -f docker-compose.testers.yml up
#
# To pull the latest version:
#   docker compose -f docker-compose.testers.yml pull
#   docker compose -f docker-compose.testers.yml up

services:
  iaccreator:
    image: ghcr.io/enriqts/iaccreator:latest
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      - CORS_ORIGIN=http://localhost:3000
      - PERSISTENCE_BACKEND=tinydb
    volumes:
      - app-data:/app/data

volumes:
  app-data:
