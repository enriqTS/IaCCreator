services:
  backend:
    build:
      context: .
      dockerfile: build/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - CORS_ORIGIN=http://localhost:3000
      - PERSISTENCE_BACKEND=tinydb
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: .
      dockerfile: build/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend-data:
